server {
  listen 80;
  server_name truthlens.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name truthlens.example.com;

  ssl_certificate /etc/letsencrypt/live/truthlens.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/truthlens.example.com/privkey.pem;

  root /var/www/truthlens/dist;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }
}
